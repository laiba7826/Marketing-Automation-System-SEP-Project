{% extends 'portal_base.html' %}

{% block title %}Settings - GFS Sales{% endblock %}
{% block header %}System Settings{% endblock %}

{% block content %}
<div class="grid-2">
    <div class="card">
        <h3>Theme Customization</h3>
        <p>Choose your preferred interface style.</p>
        <form action="{{ url_for('portal_sales_update_theme') }}" method="POST" style="margin-top: 15px;">
            <div class="form-group">
                <select name="theme" class="form-control">
                    <option value="default">Light Blue (Default)</option>
                    <option value="dark">Sophisticated Dark</option>
                    <option value="luxury">Luxury Gold</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Apply Theme</button>
        </form>
    </div>

    <div class="card">
        <h3>Security</h3>
        <p>Update your portal access credentials.</p>
        <form action="{{ url_for('portal_sales_update_password') }}" method="POST" style="margin-top: 15px;">
            <div class="form-group">
                <input type="password" name="current_password" class="form-control" placeholder="Current Password"
                    required>
            </div>
            <div class="form-group">
                <input type="password" name="new_password" class="form-control" placeholder="New Password" required>
            </div>
            <div class="form-group">
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm New Password"
                    required>
            </div>
            <button type="submit" class="btn btn-secondary">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
