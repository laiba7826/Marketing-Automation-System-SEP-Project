{% extends 'portal_base.html' %}

{% block title %}Settings - GFS Creator{% endblock %}
{% block header %}Account Preferences{% endblock %}

{% block content %}
<div class="grid-2" style="align-items: start;">
    <!-- Theme Settings -->
    <div class="card" style="text-align: left;">
        <h3><i class="fas fa-palette" style="color: var(--secondary-color);"></i> Personalize Workspace</h3>
        <p style="margin-bottom: 20px; color: #777;">Customize the look and feel of your portal.</p>

        <form action="{{ url_for('portal_content_update_theme') }}" method="POST">
            <div class="form-group">
                <label for="theme">Choose Color Theme</label>
                <select id="theme" name="theme" class="form-control">
                    <option value="default" {{ 'selected' if theme=='default' else '' }}>GFS Standard (Navy)</option>
                    <option value="dark" {{ 'selected' if theme=='dark' else '' }}>Midnight Mode</option>
                    <option value="light" {{ 'selected' if theme=='light' else '' }}>Fresh Palette (Green/Blue)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save Theme</button>
        </form>
    </div>

    <!-- Password Settings -->
    <div class="card" style="text-align: left;">
        <h3><i class="fas fa-shield-alt" style="color: var(--secondary-color);"></i> Privacy & Security</h3>
        <p style="margin-bottom: 20px; color: #777;">Keep your creator account secure.</p>

        <form action="{{ url_for('portal_content_update_password') }}" method="POST">
            <div class="form-group">
                <label for="current_password">Current Team Password</label>
                <input type="password" id="current_password" name="current_password" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Secret Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Verify New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Revise Password</button>
        </form>
    </div>
</div>
{% endblock %}
