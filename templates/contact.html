{% extends 'base.html' %}

{% block title %}Contact Us - GFS System{% endblock %}

{% block content %}
<section class="section-padding bg-light">
    <div class="container">
        <h1 class="section-title">Contact Us</h1>

        <div class="grid-2">
            <div>
                <h3>Get in Touch</h3>
                <p>Have questions? We are here to help.</p>
                <br>
                <p><i class="fas fa-map-marker-alt" style="color: var(--secondary-color); width: 20px;"></i> 123
                    GFS Builders, Scheme 33 Karachi</p>
                <p><i class="fas fa-phone" style="color: var(--secondary-color); width: 20px;"></i> 021-555-111</p>
                <p><i class="fas fa-envelope" style="color: var(--secondary-color); width: 20px;"></i>
                    support@gfs.com</p>

                <div style="margin-top: 30px;">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14476.5492850901!2d67.0984!3d24.8967!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjTCsDUzJzQ4LjEiTiA2N8KwMDUnNTQuMiJF!5e0!3m2!1sen!2s!4v1620000000000!5m2!1sen!2s"
                        width="100%" height="250" style="border:0; border-radius: 10px;" allowfullscreen=""
                        loading="lazy"></iframe>
                </div>
            </div>

            <div class="card" style="text-align: left;">
                <form action="{{ url_for('contact') }}" method="POST">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" name="company" class="form-control">
                    </div>

                    <div class="form-group">
                        <label for="role">Department to Contact</label>
                        <select id="role" name="role" class="form-control">
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                            <option value="Support">Support</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" class="form-control" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Send Inquiry</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
