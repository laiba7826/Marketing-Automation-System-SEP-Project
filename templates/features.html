{% extends 'base.html' %}

{% block title %}Features - GFS System{% endblock %}

{% block content %}
<section class="section-padding">
    <div class="container">
        <h1 class="section-title">Powerful Features</h1>
        <p class="text-center" style="max-width: 700px; margin: 0 auto 50px;">
            Designed to empower your enterprise with tools that scale.
        </p>

        <div class="grid-3">
            {% for feature in features %}
            <div class="card">
                <i class="{{ feature.icon }} card-icon"></i>
                <h3>{{ feature.title }}</h3>
                <p>{{ feature.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
