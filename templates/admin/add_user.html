{% extends 'admin_base.html' %}

{% block title %}Add User - GFS Admin{% endblock %}
{% block header %}Add New User{% endblock %}

{% block content %}
<div class="table-container" style="max-width: 600px;">
    <a href="{{ url_for('admin_users') }}" style="display:block; margin-bottom: 20px; color: var(--accent-color);"><i
            class="fas fa-arrow-left"></i> Back to Users</a>

    <form action="{{ url_for('admin_add_user') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" class="form-control">
                <option value="Admin">Admin</option>
                <option value="Project Supervisor">Project Supervisor</option>
                <option value="Marketing Team">Marketing Team</option>
                <option value="Content Creator">Content Creator</option>
                <option value="Sales Team">Sales Team</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Create User</button>
    </form>
</div>
{% endblock %}
