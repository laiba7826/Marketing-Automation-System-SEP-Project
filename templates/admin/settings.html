{% extends 'admin_base.html' %}

{% block title %}Settings - GFS Admin{% endblock %}
{% block header %}System Settings{% endblock %}

{% block content %}
<div class="grid-2" style="align-items: start;">
    <!-- Theme Settings -->
    <div class="card" style="text-align: left;">
        <h3><i class="fas fa-palette" style="color: var(--secondary-color);"></i> Appearance</h3>
        <p style="margin-bottom: 20px; color: #777;">Customize the look and feel of the application.</p>

        <form action="{{ url_for('admin_update_theme') }}" method="POST">
            <div class="form-group">
                <label for="theme">Select Theme</label>
                <select id="theme" name="theme" class="form-control">
                    <option value="default" {{ 'selected' if theme=='default' else '' }}>Default (Navy/Light)</option>
                    <option value="dark" {{ 'selected' if theme=='dark' else '' }}>Dark Mode</option>
                    <option value="light" {{ 'selected' if theme=='light' else '' }}>Light Mode (Blue/Green)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Save Theme</button>
        </form>
    </div>

    <!-- Password Settings -->
    <div class="card" style="text-align: left;">
        <h3><i class="fas fa-lock" style="color: var(--secondary-color);"></i> Security</h3>
        <p style="margin-bottom: 20px; color: #777;">Update your administrator password.</p>

        <form action="{{ url_for('admin_update_password') }}" method="POST">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
