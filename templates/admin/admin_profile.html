{% extends 'admin_base.html' %}

{% block title %}Admin Profile - GFS Admin{% endblock %}
{% block header %}Admin Profile{% endblock %}

{% block content %}
<div class="card">
    <div style="display: flex; align-items: center; margin-bottom: 30px;">
        <div
            style="width: 100px; height: 100px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-right: 30px;">
            <i class="fas fa-user-shield"></i>
        </div>
        <div>
            <h2>{{ user.username }}</h2>
            <p style="color: #777;">System {{ user.role }}</p>
            <span class="badge"
                style="background: #2ecc71; color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem;">Active
                Administrator</span>
        </div>
    </div>

    <form action="{{ url_for('admin_update_profile') }}" method="POST">
        <div class="grid-2">
            <div>
                <h4>Personal Information</h4>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" value="{{ user.full_name or '' }}"
                        required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email or '' }}" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone" class="form-control" value="{{ user.phone or '' }}" required>
                </div>
            </div>
            <div>
                <h4>Account Details</h4>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" value="{{ user.username }}" readonly>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" class="form-control" value="{{ user.role }}" readonly>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px; text-align: right;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
