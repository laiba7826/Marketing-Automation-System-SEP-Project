{% extends 'admin_base.html' %}

{% block title %}Edit User - GFS Admin{% endblock %}
{% block header %}Edit User{% endblock %}

{% block content %}
<div class="table-container" style="max-width: 600px;">
    <a href="{{ url_for('admin_users') }}" style="display:block; margin-bottom: 20px; color: var(--accent-color);"><i
            class="fas fa-arrow-left"></i> Back to Users</a>

    <form action="{{ url_for('admin_edit_user', user_id=user['id']) }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" value="{{ user['username'] }}"
                required>
        </div>

        <div class="form-group">
            <label for="password">Password (Leave blank to keep unchanged)</label>
            <input type="password" id="password" name="password" class="form-control">
        </div>

        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" class="form-control">
                <option value="Admin" {{ 'selected' if user['role']=='Admin' else '' }}>Admin</option>
                <option value="Project Supervisor" {{ 'selected' if user['role']=='Project Supervisor' else '' }}>
                    Project Supervisor</option>
                <option value="Marketing Team" {{ 'selected' if user['role']=='Marketing Team' else '' }}>Marketing Team
                </option>
                <option value="Content Creator" {{ 'selected' if user['role']=='Content Creator' else '' }}>Content
                    Creator</option>
                <option value="Sales Team" {{ 'selected' if user['role']=='Sales Team' else '' }}>Sales Team</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Update User</button>
    </form>
</div>
{% endblock %}
